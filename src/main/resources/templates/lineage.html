<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header}"></head>
<body class="bg-gray-50">
    <nav th:replace="~{fragments/navbar :: navbar(activePage='lineage')}"></nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Data Lineage</h1>
            <p class="text-gray-600">Trace data flow from source to consumption</p>
        </div>

        <!-- Search Field -->
        <div class="mb-6 bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Select Field to Trace</label>
            <div class="flex space-x-4">
                <input type="text" placeholder="Search for a field (e.g., customer_email, order_id)..." 
                       class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary"
                       id="lineageSearch">
                <button onclick="searchLineage()" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-secondary transition">
                    Trace Lineage
                </button>
            </div>
        </div>

        <!-- Lineage Direction Tabs -->
        <div class="mb-6">
            <div class="border-b border-gray-200">
                <nav class="-mb-px flex space-x-8">
                    <button onclick="showTab('upstream')" id="upstream-tab" class="tab-button border-b-2 border-primary text-primary py-4 px-1 text-sm font-medium">
                        Upstream (Sources)
                    </button>
                    <button onclick="showTab('downstream')" id="downstream-tab" class="tab-button border-b-2 border-transparent text-gray-500 hover:text-gray-700 py-4 px-1 text-sm font-medium">
                        Downstream (Consumers)
                    </button>
                    <button onclick="showTab('complete')" id="complete-tab" class="tab-button border-b-2 border-transparent text-gray-500 hover:text-gray-700 py-4 px-1 text-sm font-medium">
                        Complete Graph
                    </button>
                </nav>
            </div>
        </div>

        <!-- Lineage Visualization -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
            <div id="lineage-viz" class="min-h-96 flex items-center justify-center">
                <div class="text-center">
                    <svg class="mx-auto h-16 w-16 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    <h3 class="mt-4 text-lg font-medium text-gray-900">Select a field to visualize lineage</h3>
                    <p class="mt-2 text-sm text-gray-500">Search for a field above to see its data lineage graph</p>
                </div>
            </div>
        </div>

        <!-- Lineage Legend -->
        <div class="mt-6 bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h3 class="text-sm font-medium text-gray-900 mb-4">Lineage Types</h3>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div class="flex items-center space-x-2">
                    <div class="w-4 h-4 rounded bg-blue-500"></div>
                    <span class="text-sm text-gray-700">Direct</span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-4 h-4 rounded bg-green-500"></div>
                    <span class="text-sm text-gray-700">Derived</span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-4 h-4 rounded bg-purple-500"></div>
                    <span class="text-sm text-gray-700">Aggregated</span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-4 h-4 rounded bg-yellow-500"></div>
                    <span class="text-sm text-gray-700">Filtered</span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-4 h-4 rounded bg-red-500"></div>
                    <span class="text-sm text-gray-700">Joined</span>
                </div>
            </div>
        </div>

    </main>

    <script>
        let currentTab = 'upstream';

        function showTab(tab) {
            currentTab = tab;
            // Update active tab styling
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('border-primary', 'text-primary');
                btn.classList.add('border-transparent', 'text-gray-500');
            });
            document.getElementById(tab + '-tab').classList.add('border-primary', 'text-primary');
            document.getElementById(tab + '-tab').classList.remove('border-transparent', 'text-gray-500');
        }

        async function searchLineage() {
            const query = document.getElementById('lineageSearch').value;
            if (!query) {
                alert('Please enter a field name');
                return;
            }

            const vizDiv = document.getElementById('lineage-viz');
            vizDiv.innerHTML = '<div class="text-center py-12"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto"></div><p class="mt-4 text-gray-600">Loading lineage...</p></div>';

            // Simulate API call
            setTimeout(() => {
                vizDiv.innerHTML = `
                    <div class="space-y-4">
                        <div class="text-center mb-6">
                            <div class="inline-block px-4 py-2 bg-primary text-white rounded-lg font-medium">
                                ${query}
                            </div>
                        </div>
                        <div class="flex items-center justify-center space-x-4">
                            <div class="text-center">
                                <div class="w-32 h-20 bg-blue-100 rounded-lg flex items-center justify-center mb-2">
                                    <span class="text-sm font-medium text-blue-900">Source Field</span>
                                </div>
                                <p class="text-xs text-gray-600">upstream_table.field</p>
                            </div>
                            <svg class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                            <div class="text-center">
                                <div class="w-32 h-20 bg-green-100 rounded-lg flex items-center justify-center mb-2">
                                    <span class="text-sm font-medium text-green-900">${query}</span>
                                </div>
                                <p class="text-xs text-gray-600">current_table</p>
                            </div>
                            <svg class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                            <div class="text-center">
                                <div class="w-32 h-20 bg-purple-100 rounded-lg flex items-center justify-center mb-2">
                                    <span class="text-sm font-medium text-purple-900">Target Field</span>
                                </div>
                                <p class="text-xs text-gray-600">downstream_table.field</p>
                            </div>
                        </div>
                        <p class="text-center text-sm text-gray-500 mt-6">
                            Use the API endpoint <code class="px-2 py-1 bg-gray-100 rounded">/api/v1/lineage/${currentTab}/{fieldId}</code> for detailed lineage data
                        </p>
                    </div>
                `;
            }, 1000);
        }
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
