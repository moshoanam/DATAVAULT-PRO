<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <nav th:fragment="navbar(activePage)" class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">

                <!-- Left: Logo + Nav links -->
                <div class="flex items-center min-w-0">
                    <!-- Logo -->
                    <a href="/" class="flex items-center flex-shrink-0 mr-4">
                        <svg class="h-7 w-7 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                        </svg>
                        <span class="ml-2 text-base font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent whitespace-nowrap">
                            DataVault Pro
                        </span>
                    </a>

                    <!-- Desktop nav links -->
                    <div class="hidden lg:flex items-center space-x-1">
                        <a href="/"
                           th:classappend="${activePage == 'home' ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}"
                           class="px-3 py-1.5 rounded-md text-sm font-medium transition whitespace-nowrap">Dashboard</a>

                        <a href="/catalog"
                           th:classappend="${activePage == 'catalog' ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}"
                           class="px-3 py-1.5 rounded-md text-sm font-medium transition whitespace-nowrap">Catalog</a>

                        <a href="/lineage"
                           th:classappend="${activePage == 'lineage' ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}"
                           class="px-3 py-1.5 rounded-md text-sm font-medium transition whitespace-nowrap">Lineage &amp; ERD</a>

                        <a href="/glossary"
                           th:classappend="${activePage == 'glossary' ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}"
                           class="px-3 py-1.5 rounded-md text-sm font-medium transition whitespace-nowrap">Glossary</a>

                        <a href="/governance"
                           th:classappend="${activePage == 'governance' ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}"
                           class="px-3 py-1.5 rounded-md text-sm font-medium transition whitespace-nowrap">Governance</a>

                        <a href="/quality"
                           th:classappend="${activePage == 'quality' ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}"
                           class="px-3 py-1.5 rounded-md text-sm font-medium transition whitespace-nowrap">Quality</a>

                        <a href="/migration"
                           th:classappend="${activePage == 'migration' ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}"
                           class="px-3 py-1.5 rounded-md text-sm font-medium transition whitespace-nowrap flex items-center gap-1">
                            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                            </svg>
                            Migrate
                        </a>
                    </div>

                    <!-- Medium screens: compact icon-labeled links -->
                    <div class="hidden md:flex lg:hidden items-center space-x-0.5 ml-1">
                        <a href="/"          th:classappend="${activePage == 'home'       ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary'}" class="px-2 py-1.5 rounded text-xs font-medium transition">Home</a>
                        <a href="/catalog"   th:classappend="${activePage == 'catalog'    ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary'}" class="px-2 py-1.5 rounded text-xs font-medium transition">Catalog</a>
                        <a href="/lineage"   th:classappend="${activePage == 'lineage'    ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary'}" class="px-2 py-1.5 rounded text-xs font-medium transition">Lineage</a>
                        <a href="/glossary"  th:classappend="${activePage == 'glossary'   ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary'}" class="px-2 py-1.5 rounded text-xs font-medium transition">Glossary</a>
                        <a href="/governance" th:classappend="${activePage == 'governance' ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary'}" class="px-2 py-1.5 rounded text-xs font-medium transition">Gov.</a>
                        <a href="/quality"   th:classappend="${activePage == 'quality'    ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary'}" class="px-2 py-1.5 rounded text-xs font-medium transition">Quality</a>
                        <a href="/migration" th:classappend="${activePage == 'migration'  ? 'text-primary bg-primary/5' : 'text-gray-600 hover:text-primary'}" class="px-2 py-1.5 rounded text-xs font-medium transition">Migrate</a>
                    </div>
                </div>

                <!-- Right: Search + User -->
                <div class="flex items-center gap-2 flex-shrink-0 ml-2">
                    <!-- Search — hidden on small, compact on md+ -->
                    <div class="hidden md:block relative">
                        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 h-3.5 w-3.5 text-gray-400 pointer-events-none"
                             fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
                        </svg>
                        <input type="search" placeholder="Search…"
                               class="w-40 lg:w-52 pl-8 pr-3 py-1.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                               id="globalSearch" onkeyup="handleSearch(event)">
                    </div>

                    <!-- Mobile search icon -->
                    <button class="md:hidden p-1.5 rounded-lg text-gray-500 hover:bg-gray-100"
                            onclick="document.getElementById('mobileSearchBar').classList.toggle('hidden')">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
                        </svg>
                    </button>

                    <!-- User badge -->
                    <div class="flex items-center gap-1.5 px-2 py-1 rounded-lg bg-gray-100">
                        <div class="w-7 h-7 rounded-full bg-gradient-to-r from-primary to-secondary flex items-center justify-center text-white font-semibold text-xs">A</div>
                        <span class="hidden sm:inline text-sm font-medium text-gray-700">Admin</span>
                    </div>

                    <!-- Mobile hamburger -->
                    <button class="md:hidden p-1.5 rounded-lg text-gray-500 hover:bg-gray-100"
                            onclick="document.getElementById('mobileMenu').classList.toggle('hidden')">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Mobile search bar (collapsible) -->
            <div id="mobileSearchBar" class="hidden pb-2 md:hidden">
                <input type="search" placeholder="Search metadata…"
                       class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary text-sm"
                       onkeyup="handleSearch(event)">
            </div>

            <!-- Mobile menu (collapsible) -->
            <div id="mobileMenu" class="hidden pb-3 md:hidden border-t border-gray-100 pt-2">
                <div class="grid grid-cols-2 gap-1">
                    <a href="/"          class="px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Dashboard</a>
                    <a href="/catalog"   class="px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Catalog</a>
                    <a href="/lineage"   class="px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Lineage &amp; ERD</a>
                    <a href="/glossary"  class="px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Glossary</a>
                    <a href="/governance" class="px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Governance</a>
                    <a href="/quality"   class="px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Quality</a>
                    <a href="/migration" class="px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 col-span-2">
                        ↔ MS SQL → PostgreSQL Migration
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <script>
        function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = event.target.value.trim();
                if (query) window.location.href = '/search?query=' + encodeURIComponent(query);
            }
        }
    </script>
</body>
</html>
