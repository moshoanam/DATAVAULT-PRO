<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header}"></head>
<body class="bg-gray-50">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Search Results</h1>
            <p class="text-gray-600">Found results for: <span class="font-semibold" th:text="${query}">search query</span></p>
        </div>

        <!-- Results Tabs -->
        <div class="mb-6">
            <div class="border-b border-gray-200">
                <nav class="-mb-px flex space-x-8">
                    <button class="border-b-2 border-primary text-primary py-4 px-1 text-sm font-medium">
                        All Results
                    </button>
                    <button class="border-b-2 border-transparent text-gray-500 hover:text-gray-700 py-4 px-1 text-sm font-medium">
                        Databases
                    </button>
                    <button class="border-b-2 border-transparent text-gray-500 hover:text-gray-700 py-4 px-1 text-sm font-medium">
                        Tables
                    </button>
                    <button class="border-b-2 border-transparent text-gray-500 hover:text-gray-700 py-4 px-1 text-sm font-medium">
                        Fields
                    </button>
                    <button class="border-b-2 border-transparent text-gray-500 hover:text-gray-700 py-4 px-1 text-sm font-medium">
                        Glossary
                    </button>
                </nav>
            </div>
        </div>

        <!-- Search Results -->
        <div class="space-y-4">
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 hover:shadow-md transition cursor-pointer">
                <div class="flex items-start justify-between">
                    <div class="flex-1">
                        <span class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-800 mb-2">
                            Database
                        </span>
                        <h3 class="text-lg font-semibold text-gray-900 mb-2">customer_analytics</h3>
                        <p class="text-sm text-gray-600 mb-2">PostgreSQL database containing customer data and analytics</p>
                        <p class="text-xs text-gray-500">12 tables • Production environment</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 hover:shadow-md transition cursor-pointer">
                <div class="flex items-start justify-between">
                    <div class="flex-1">
                        <span class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-800 mb-2">
                            Field
                        </span>
                        <h3 class="text-lg font-semibold text-gray-900 mb-2">customer_email</h3>
                        <p class="text-sm text-gray-600 mb-2">Email address of the customer • PII field</p>
                        <p class="text-xs text-gray-500">customers table • varchar(255)</p>
                    </div>
                </div>
            </div>
        </div>

    </main>
</body>
</html>
