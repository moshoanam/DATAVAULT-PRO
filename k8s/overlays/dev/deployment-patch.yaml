apiVersion: apps/v1
kind: Deployment
metadata:
  name: datavault-backend
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: datavault-backend
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
